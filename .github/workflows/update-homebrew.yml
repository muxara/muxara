name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          # Download both DMGs
          gh release download "$GITHUB_REF_NAME" \
            --repo muxara/muxara \
            --pattern "*.dmg" \
            --dir ./assets

          ls -la ./assets/

          # Compute SHA256 for each architecture
          for f in ./assets/*aarch64*.dmg; do
            echo "ARM_SHA256=$(shasum -a 256 "$f" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          done
          for f in ./assets/*x86_64*.dmg; do
            echo "INTEL_SHA256=$(shasum -a 256 "$f" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          done

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: muxara/homebrew-muxara
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask formula
        run: |
          cat > Casks/muxara.rb << 'CASK'
          cask "muxara" do
            arch arm: "aarch64", intel: "x86_64"

            version "VERSION_PLACEHOLDER"
            sha256 arm:   "ARM_SHA256_PLACEHOLDER",
                   intel: "INTEL_SHA256_PLACEHOLDER"

            url "https://github.com/muxara/muxara/releases/download/v#{version}/Muxara_#{version}_#{arch}.dmg",
                verified: "github.com/muxara/muxara/"
            name "Muxara"
            desc "Desktop control plane for managing parallel Claude Code sessions"
            homepage "https://github.com/muxara/muxara"

            depends_on macos: ">= :monterey"

            app "Muxara.app"

            zap trash: [
              "~/Library/Application Support/com.muxara.app",
              "~/Library/Preferences/com.muxara.app.plist",
            ]
          end
          CASK

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" Casks/muxara.rb
          sed -i "s/ARM_SHA256_PLACEHOLDER/$ARM_SHA256/" Casks/muxara.rb
          sed -i "s/INTEL_SHA256_PLACEHOLDER/$INTEL_SHA256/" Casks/muxara.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/muxara.rb
          git commit -m "Update Muxara to v$VERSION"
          git push
